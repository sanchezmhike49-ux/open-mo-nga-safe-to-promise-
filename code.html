<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB U MADAM BABY!! 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial Black', Arial, sans-serif;
            background: linear-gradient(45deg, #ff6b9d, #c44569, #ff6b9d);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .love-text {
            font-size: clamp(3rem, 12vw, 8rem);
            font-weight: 900;
            color: #fff;
            text-shadow: 
                0 0 10px #ff6b9d,
                0 0 20px #ff6b9d,
                0 0 30px #c44569,
                2px 2px 0 #000;
            letter-spacing: 0.1em;
            text-align: center;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite alternate;
            text-transform: uppercase;
        }

        @keyframes glow {
            from {
                text-shadow: 
                    0 0 10px #ff6b9d,
                    0 0 20px #ff6b9d,
                    0 0 30px #c44569,
                    2px 2px 0 #000;
            }
            to {
                text-shadow: 
                    0 0 20px #ff1493,
                    0 0 30px #ff1493,
                    0 0 40px #ff69b4,
                    0 0 50px #ff1493,
                    3px 3px 0 #000;
            }
        }

        .heart {
            font-size: clamp(6rem, 20vw, 12rem);
            animation: heartbeat 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 20px #ff1493);
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }

        .sparkles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .sparkle {
            position: absolute;
            color: #fff;
            font-size: 2rem;
            animation: sparkleFloat 3s linear infinite;
        }

        @keyframes sparkleFloat {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 480px) {
            .love-text {
                letter-spacing: 0.05em;
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="sparkles" id="sparkles"></div>
    
    <div class="love-text">LAB U MADAM BABY!!</div>
    <div class="heart">💖</div>

    <script>
        // Create floating sparkles
        function createSparkle() {
            const sparkles = document.getElementById('sparkles');
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.innerHTML = ['✨', '💫', '⭐', '🌟', '💖'][Math.floor(Math.random() * 5)];
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.animationDuration = (Math.random() * 3 + 2) + 's';
            sparkle.style.animationDelay = Math.random() * 2 + 's';
            
            sparkles.appendChild(sparkle);
            
            setTimeout(() => {
                sparkle.remove();
            }, 5000);
        }

        // Create sparkles continuously
        setInterval(createSparkle, 300);

        // Initial sparkles
        for (let i = 0; i < 10; i++) {
            setTimeout(createSparkle, i * 200);
        }
    </script>
</body>
</html>
